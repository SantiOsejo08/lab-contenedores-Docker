version: '3.7'

services:
  # Contenedor de MariaDB
  mariadb:
    image: mariadb:latest
    container_name: mariadb
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mi_base_de_datos
      MYSQL_USER: usuario
      MYSQL_PASSWORD: password
    volumes:
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - webnet

# Contenedor de Apache PHP 1
  web1:
    build: ./web1
    container_name: web1
#    depends_on:
#      - mariadb
    networks:
      - webnet

  # Contenedor de Apache PHP 2
  web2:
    build: ./web2
    container_name: web2
#    depends_on:
#      - mariadb
    networks:
      - webnet

  # Contenedor de HAProxy
  haproxy:
    image: haproxy:latest
    container_name: haproxy
    ports:
      - "80:80"
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg
    depends_on:
      - web1
      - web2
    networks:
      - webnet

networks:
  webnet:
    driver: bridge
